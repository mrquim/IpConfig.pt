<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IpConfig.pt - Qual é o meu IP?</title>
  <meta name="description" content="IpConfig.pt: descobre rapidamente o teu endereço IP público IPv4 e IPv6, ISP, localização aproximada, hostname, fuso horário, navegador e resolução do ecrã.">
  <meta name="author" content="Joaquim de Oliveira - https://www.JoaquimdeOliveira.eu" />
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#1f1f47">
  <link rel="canonical" href="https://www.ipconfig.pt">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_PT">
  <meta property="og:title" content="IpConfig.pt - Qual é o meu IP? IPv4, IPv6, localização e navegador">
  <meta property="og:description" content="IpConfig.pt mostra o teu IPv4, IPv6, ISP, localização aproximada e dados do navegador numa página rápida e simples.">
  <meta property="og:url" content="https://www.ipconfig.pt">
  <meta name="twitter:card" content="summary_large_image">
  

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f0f23;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Loader fullscreen */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f0f23;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      color: #fff;
    }

    /* Spinner */
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Iframe ocupa tudo */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <div>A carregar...</div>
  </div>

  <!-- Iframe -->
  <iframe 
    src="https://www.ip.joaquimdeoliveira.eu/novo"
    onload="document.getElementById('loader').style.display='none'">
  </iframe>

</body>
</html>
